<div class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md mx-auto">

    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-3 mb-3">
        <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="text-white">
            <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"></path>
            <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"></path>
            <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 1-2 2h-2"></path>
            <path d="M10 6h4"></path><path d="M10 10h4"></path>
            <path d="M10 14h4"></path><path d="M10 18h4"></path>
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-white tracking-tight">FacilityHub</h1>
      </div>
      <p class="text-gray-400 text-sm tracking-tight">Facility &amp; Equipment Management Platform</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-8">
      <div class="mb-6">
        <h2 class="text-xl font-semibold text-gray-900 mb-1">Create an account</h2>
        <p class="text-gray-500 text-sm">Fill in the details below to get started</p>
      </div>

      <!-- Error Message -->
      @if (errorMessage()) {
        <div class="mb-5 flex items-start gap-2 bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="shrink-0 mt-0.5">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" x2="12" y1="8" y2="12"></line>
            <line x1="12" x2="12.01" y1="16" y2="16"></line>
          </svg>
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <form (ngSubmit)="register()">
        <!-- Name Row -->
        <div class="grid grid-cols-2 gap-3 mb-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" required
              [(ngModel)]="registerRequest().firstName"
              placeholder="John"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" required
              [(ngModel)]="registerRequest().lastName"
              placeholder="Doe"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
          </div>
        </div>

        <!-- Email -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1" for="email">Email Address</label>
          <div class="relative">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
              <rect width="20" height="16" x="2" y="4" rx="2"></rect>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
            </svg>
            <input type="email" id="email" name="email" required
              [(ngModel)]="registerRequest().email"
              placeholder="you@example.com"
              class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
          </div>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
          <div class="relative">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="password" name="password" required
              [(ngModel)]="registerRequest().password"
              placeholder="Min 8 characters"
              class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1" for="confirmPassword">Confirm Password</label>
          <div class="relative">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="confirmPassword" name="confirmPassword" required
              [(ngModel)]="registerRequest().confirmPassword"
              placeholder="Repeat your password"
              class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" [disabled]="loading()"
          class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-60 disabled:cursor-not-allowed text-white py-2.5 px-4 rounded-lg font-medium text-sm transition duration-300 cursor-pointer">
          @if (loading()) {
            <span>Creating account...</span>
          } @else {
            <span>Create Account</span>
          }
        </button>
      </form>

      <!-- Sign in link -->
      <p class="mt-5 text-center text-sm text-gray-500">
        Already have an account?
        <a routerLink="/login" class="text-indigo-600 hover:text-indigo-700 font-medium">Sign in</a>
      </p>
    </div>

  </div>
</div>
