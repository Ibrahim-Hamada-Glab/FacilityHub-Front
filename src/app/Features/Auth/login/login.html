<div
    class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 flex items-center justify-center p-4">
    <div class="container max-w-md mx-auto">

        <div class="header">
            <div class="identity">
                <div
                    class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-building2 text-white">
                        <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"></path>
                        <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"></path>
                        <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"></path>
                        <path d="M10 6h4"></path>
                        <path d="M10 10h4"></path>
                        <path d="M10 14h4"></path>
                        <path d="M10 18h4"></path>
                    </svg></div>
                <h1 class="text-3xl font-bold text-white tracking-tight">FacilityHub</h1>
            </div>
            <div class="desc">

                <p class="text-gray-400 line-clamp-2 antialiased tracking-tight text-sm">Facility & Equipment Management Platform</p>
            </div>

        </div>
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-10">
            <div class="pb-10">
                <h2 class="text-xl font-semibold text-gray-900 mb-1 ml-0">Welcome Back!</h2>
                <p class="text-gray-600 text-sm ">Sign in to your FacilityHub account</p>
            </div>

            <form (ngSubmit)="login()">
                <div class="form-group">
                    <label class="text-gray-700" for="Email">Email</label>
                    <div class="relative w-full">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>
                    <input type="text" id="email" name="email" required [(ngModel)]="loginRequest().email">
                    </div>
                </div>
                <div class="form-group">
                    <label class="text-gray-700" for="password">Password</label>
                    <input type="password" id="password" name="password" required [(ngModel)]="loginRequest().password" >
                </div>
                <div class="flex justify-end mb-4 text-blue-900 font-light text-sm">
                    <a href="#"  > Forgot Password?</a>
                </div>
                <div class="inline-flex items-center gap-2 mb-4 size-sm justify-center hover:cursor-pointer ">
                    <input type="checkbox" id="remember" name="remember" class="w-4 h-4 hover:cursor-pointer text-indigo-600 bg-gray-100 border-gray-300 rounded focus:ring-indigo-500">
                    <label class=" hover:cursor-pointer text-gray-700 text-sm" for="remember">Remember Me</label>
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-4 rounded-md transition  hover:cursor-pointer  duration-300">Login</button>
            </form>
        </div>
    </div>
</div>
