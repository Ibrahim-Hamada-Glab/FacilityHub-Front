<section class="flex gap-10 pr-10 pl-10 bg-white shadow-md w-full active">
 
<div class="p-2 rounded-lg m-5 hover:bg-gray-100 text-gray-500 cursor-pointer" (click)="toggleSidebar()">
<svg class = "menu-icon" xmlns="http://www.w3.org/2000/svg" width="30" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-menu"><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg>
 </div>
<div class="search  m-5 flex items-center bg-gray-100 rounded-lg px-2 py-1 relative flex-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search text-gray-500 outline-none"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>

    <input type="text" placeholder="Search..." class="search-input p-1 bg-transparent w-full outline-none text-gray-700">
    
</div>
<div class="notification flex justify-center items-top align-top relative border-r-2 border-gray-200 rounded-lg mr-5 p-5 hover:bg-gray-100 cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-bell text-gray-500"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>

    <span class="notification-count position-absolute top-0 right-0 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">3</span>
</div>
<div class="profile flex-1 relative flex items-center cursor-pointer">
    <img class = "profile-image"src="https://i.pravatar.cc/300" alt="Profile Picture" class="profile-pic">
   
</div>
</section>
